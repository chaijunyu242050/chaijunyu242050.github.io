<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: "Archivo", sans-serif;
        }

        div.container {
            display: flex;
            margin: auto;
            padding: 18px 35px;
            justify-content: space-between;
            align-items: center;
        }

        div.left {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 10px;
        }

        div.middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            gap: 35px;
            font-weight: 600;
        }

        div.select {
            color: #f9612b;
        }

        div.right {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        div.icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        button {
            background-color: #f9612b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
        }

        div.humburger {
            display: none
        }

        /* middle size */
        @media screen and (max-width: 964px) {
            div.humburger {
                display: flex;
            }

            div.choice {
                display: none;
            }
        }

        /* small size */
        @media screen and (max-width: 385.6px) {
            div.telephone {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left"><img src="images/logo.png" width="45%"></div>

        <div class="middle">
            <div>Home</div>
            <div class="select">Services</div>
            <div>Work</div>
            <div>Project Details</div>
            <div>Contact</div>
        </div>

        <div class="right">
            <div class="icon"><img src="images/phone.png" width="18px"></div>
            <div>555-123-4567</div>
            <div><button>Contact</button></div>
            <div class="humburger"><img src="images/humburger.png" width="18px"></div>
        </div>
    </div>
</body>

</html>
