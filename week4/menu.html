<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: "Archivo", sans-serif;
        }

        div.container {
            display: flex;
            margin: auto;
            padding: 13px 45px;
            justify-content: space-between;
            align-items: center;
        }

        div.left img {
            height: 35px;
            width: auto;
        }

        div.middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            gap: 35px;
            font-weight: 600;
            margin-right: -46px;
        }

        div.select {
            color: #f9612b;
        }

        div.right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-weight: bold;
            margin-right: 35px;
        }

        div.telephone img {
            width: 20px;
            height: 20px;
            margin-right: -13px;
        }

        div.right button {
            background-color: #f9612b;
            color: white;
            border: none;
            padding: 11px 14px;
            border-radius: 6px;
            font-size: 14px;

        }

        div.humburger {
            display: none;
            width: 35px;
            height: 35px;
        }

        /* middle size */
        @media screen and (max-width: 1280px) {
            div.container {
                padding: 13px 15px;
            }

            div.humburger {
                display: flex;
            }

            div.middle {
                display: none;
            }

            div.telephone {
                margin-right: -12px;
            }

            div.telephone img {
                margin-right: 0px;
            }

            button {
                display: none;
            }

            div.right {
                margin-right: 0px;
            }
        }

        /* small size */
        @media screen and (max-width: 768px) {
            div.container {
                padding: 13px 10px;
            }

            div.telephone {
                display: none;
            }

            div.right {
                margin-right: -5px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left"><img src="images/logo.png"></div>

        <div class="middle">
            <div>Home</div>
            <div class="select">Services</div>
            <div>Work</div>
            <div>Project Details</div>
            <div>Contact</div>
        </div>

        <div class="right">
            <div class="telephone"><img src="images/phone.png"></div>
            <div class="telephone">555-123-4567</div>
            <div><button>Contact</button></div>
            <div class="humburger"><img src="images/humburger.png"></div>
        </div>
    </div>
</body>

</html>
