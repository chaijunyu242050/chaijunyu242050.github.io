<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        button.one {
            background-color: black;
            color: white;
            border: none;
            padding: 12px 22px;
            margin-right: 12px;
        }

        button.two {
            background-color: rgb(85, 163, 90);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            margin-right: 14px;
        }

        button.three {
            background-color: rgb(249, 218, 78);
            color: black;
            border: none;
            padding: 12px 54px;
            border-radius: 22px;
        }

        button.four {
            background-color: rgb(115, 84, 173);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 8px;
        }

        button.five {
            background-color: white;
            color: rgb(108, 117, 125);
            border: 1px solid rgb(108, 117, 125);
            padding: 11px 20px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 18px;
        }

        button.six {
            background-color: rgb(45, 101, 188);
            color: white;
            border: none;
            padding: 12px 26px;
            border-radius: 24px;
            font-weight: bold;
            margin-right: 10px;
        }

        button.seven {
            background-color: white;
            color: rgb(49, 105, 186);
            border: 1px solid rgb(100, 137, 205);
            padding: 11px 22px;
            border-radius: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <button class="one">Request now</button>
    <button class="two">Sign up</button>
    <button class="three">Add to Cart</button>
    <p>
        <button class="four">Get started</button>
        <button class="five">Download</button>
        <button class="six">Apply on company website</button>
        <button class="seven">Save</button>
    </p>
</body>

</html>
