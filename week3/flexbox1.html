<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            background-color: rgb(246, 245, 239);
            font-family: "Oxygen", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        img {
            width: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        div.container {
            max-width: 1024px;
            width: 100%;
            display: flex;
            gap: 24px;
            margin: auto;
            padding: 20px;
        }

        div.select {
            flex: 1;
            background-color: white;
            border-radius: 14px;
            padding: 16px;
        }

        h2 {
            font-size: 19px;
            font-weight: 700;
            line-height: 1.25;
            margin: 0 0 10px;
            padding: 18px 14px 0px;
        }

        p {
            font-size: 13px;
            line-height: 1.6;
            margin: 0;
            padding: 0px 14px 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="select">
            <img src="images/rp.png" alt="Residential Projects">
            <h2>Residential projects</h2>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="select">
            <img src="images/cs.png" alt="Commercial Spaces">
            <h2>Commercial spaces</h2>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="select">
            <img src="images/iw.png" alt="Infrastructure works">
            <h2>Infrastructure works</h2>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
    </div>
</body>

</html>
