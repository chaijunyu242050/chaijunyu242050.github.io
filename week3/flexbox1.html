<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            background-color: rgb(246, 245, 239);
            font-family: "Oxygen", sans-serif;
        }

        img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        div.container {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        div.select {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h3 {
            margin: 0;
        }

        p {
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="select">
            <img src="images/rp.png" alt="Residential Projects">
            <h3>Residential projects</h3>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="select">
            <img src="images/cs.png" alt="Commercial Spaces">
            <h3>Commercial spaces</h3>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="select">
            <img src="images/iw.png" alt="Infrastructure works">
            <h3>Infrastructure works</h3>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
    </div>
</body>

</html>
