<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        body {
            font-family: "Space Grotesk", sans-serif;
            margin: 0;
            padding: 0;
            color: #191A23
        }

        div.container {
            width: 1200px;
            margin: auto;
        }

        div.up {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
        }

        div.upimg {
            width: 180px;
        }

        div.choice {
            display: flex;
            align-items: center;
            gap: 38px;
            font-size: 17px;
        }

        button.button {
            padding: 18px 32px;
            border: 1px solid #191A23;
            border-radius: 12px;
            background: white;
            font-size: 16px;
            font-family: "Space Grotesk", sans-serif
        }

        div.middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 45px;
        }

        div.middleleft {
            width: 46%;
        }

        div.head {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.18;
        }

        div.par {
            margin-top: 32px;
            width: 480px;
            line-height: 1.6;
            font-size: 20px;
        }

        button.book {
            margin-top: 38px;
            padding: 20px 40px;
            background: #191A23;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-family: "Space Grotesk", sans-serif
        }

        div.middleimg {
            width: 48%;
            display: flex;
            justify-content: flex-end;
        }

        div.down {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 80px;
        }

        div.downimg {
            height: 35px;
            opacity: 0.8;
            filter: grayscale(100%);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="up">
            <div class="upimg"><img src="images/lgo.png" alt="Positivus"></div>
            <div class="choice">
                <p>About us</p>
                <p>Services</p>
                <p>Use Cases</p>
                <p>Pricing</p>
                <p>Blog</p>
                <button class="button">Request a quote</button>
            </div>
        </div>

        <div class="middle">
            <div class="middleleft">
                <div class="head">
                    Navigating the digital landscape for success
                </div>
                <div class="par">
                    <p>Our digital marketing agency helps businesses grow and succeed online through a range of
                        services including SEO, PPC, social media marketing, and content creation.</p>
                </div>
                <button class="book">Book a consultation</button>
            </div>
            <div class="middleimg"><img src="images/macro.png" alt="Macro" width="560"></div>
        </div>

        <div class="down downimg">
            <img src="images/amazon.png" alt="Amazon" width="100">
            <img src="images/dnilllle.png" alt="Dilllle" width="100">
            <img src="images/hubspot.png" alt="HubSpot" width="100">
            <img src="images/notion.png" alt="Notion" width="100">
            <img src="images/netflix.png" alt="Netflix" width="100">
            <img src="images/zoom.png" alt="Zoom" width="100">
        </div>
    </div>
</body>

</html>
