<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fff;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px 40px;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:#222;
}

header button{
    padding:14px 28px;
    border:1px solid #222;
    border-radius:12px;
    background:white;
    cursor:pointer;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:60px;
}

.text{
    flex:1;
}

.text h1{
    font-size:60px;
    line-height:1.2;
    margin-bottom:25px;
}

.text p{
    color:#555;
    line-height:1.7;
    margin-bottom:30px;
}

.text button{
    padding:18px 35px;
    background:#191A23;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.image{
    flex:1;
}

.image img{
    width:100%;
    display:block;
}

.brands{
    margin-top:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.brands img{
    width:110px;
    opacity:.8;
    filter:grayscale(100%);
}
</style>
</head>
<body>
    <div class="container">

<header>

<div class="logo">
★ Positivus
</div>

<nav>
<a href="#">About us</a>
<a href="#">Services</a>
<a href="#">Use Cases</a>
<a href="#">Pricing</a>
<a href="#">Blog</a>
</nav>

<button>Request a quote</button>

</header>

<section class="hero">

<div class="text">

<h1>
Navigating the<br>
digital landscape<br>
for success
</h1>

<p>
Our digital marketing agency helps businesses grow and succeed online through a range of services including SEO, PPC, social media marketing, and content creation.
</p>

<button>Book a consultation</button>

</div>

<div class="image">
<img src="images/macro.png" alt="Hero Image">
</div>

</section>

<section class="brands">
<img src="amazon.png">
<img src="dribbble.png">
<img src="hubspot.png">
<img src="notion.png">
<img src="netflix.png">
<img src="zoom.png">
</section>

</div>

</body>
</html>
